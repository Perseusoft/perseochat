name: build & release

# Builds PerseoChat for x86_64 and aarch64 in every format (deb, rpm, AppImage,
# snap, flatpak). On a tag (v*) the artifacts are uploaded to Cloudflare R2.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm flatpak flatpak-builder elfutils libarchive-tools p7zip-full p7zip 7zip || \
          sudo apt-get install -y rpm flatpak flatpak-builder elfutils libarchive-tools p7zip-full p7zip
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.electronjs.Electron2.BaseApp//24.08 \
            org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08 || true
          sudo snap install snapcraft --classic || sudo apt-get install -y snapcraft

      - run: npm install --no-audit --no-fund

      # npm doesn't materialise electron-builder's bundled 7za binary in CI —
      # copy the real system 7-Zip binary into the exact path it chmods.
      - name: Ensure 7za binary
        run: |
          set -euo pipefail
          SYS7="$(command -v 7za || command -v 7zz || command -v 7zr || command -v 7z || true)"
          if [ -z "$SYS7" ]; then echo "::error::no system 7-Zip binary found"; exit 1; fi
          echo "using system 7-Zip: $SYS7"
          D="node_modules/7zip-bin/linux/${{ matrix.arch }}"
          mkdir -p "$D"
          install -m 0755 "$SYS7" "$D/7za"
          ls -l "$D/7za"
          "$D/7za" --help >/dev/null && echo "7za OK"

      - name: Build (${{ matrix.arch }})
        working-directory: apps/perseochat
        run: |
          EV=$(node -p "require('electron/package.json').version")
          echo "7za before build:"; ls -l ../../node_modules/7zip-bin/linux/${{ matrix.arch }}/ || true
          # npmRebuild=false stops electron-builder from running its own
          # `npm install --production`, which in an npm-workspace prunes root
          # devDeps (7zip-bin) and deletes the 7za we just staged.
          npx electron-builder --linux --${{ matrix.arch }} \
            -c.electronVersion=$EV -c.npmRebuild=false
          echo "7za after build:"; ls -l ../../node_modules/7zip-bin/linux/${{ matrix.arch }}/ || true

      - name: Collect artifacts
        run: |
          mkdir -p out
          find dist -maxdepth 1 -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.snap" -o -name "*.flatpak" \) \
            -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: perseochat-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error

      - name: Upload to Cloudflare R2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: perseochat-storage
          TAG: ${{ github.ref_name }}
        run: |
          VER=$(node -p "require('./apps/perseochat/package.json').version")
          # Versioned artifacts: releases/<tag>/<arch>/PerseoChat-<ver>-<arch>.<ext>
          aws s3 cp out/ "s3://$BUCKET/releases/$TAG/${{ matrix.arch }}/" \
            --recursive --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32
          # Stable "latest" links (version stripped): latest/<arch>/PerseoChat-<arch>.<ext>
          mkdir -p latest
          for f in out/*; do b=$(basename "$f"); cp "$f" "latest/${b/-$VER/}"; done
          aws s3 cp latest/ "s3://$BUCKET/latest/${{ matrix.arch }}/" \
            --recursive --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32
