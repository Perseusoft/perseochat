name: build & release

# Builds PerseoChat for x86_64 and aarch64 in every format (deb, rpm, AppImage,
# snap, flatpak). On a tag (v*) the artifacts are uploaded to Cloudflare R2.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          # rpmbuild for .rpm; dpkg-deb ships on ubuntu for .deb; AppImage is
          # self-contained. (snap/flatpak tooling omitted — those targets are deferred.)
          # ruby + gem fpm: electron-builder's bundled fpm is x86-only and can't
          # run on the arm64 runner (Exec format error) — install a native fpm
          # and force USE_SYSTEM_FPM at build time.
          sudo apt-get install -y rpm elfutils libarchive-tools ruby ruby-dev build-essential
          sudo gem install --no-document fpm
          fpm --version

      - run: npm install --no-audit --no-fund

      # electron-builder runs its own `npm install --production` in the app dir
      # ONLY when that dir has no node_modules. In an npm workspace the app's
      # deps are hoisted to the root, so appDir/node_modules is missing — that
      # reinstall then prunes the root devDeps (deleting 7zip-bin's 7za binary
      # right before packaging → ENOENT on chmod). Staging the app's local
      # node_modules makes electron-builder take the harmless rebuild path.
      # It also satisfies the electron-builder.yml `files` glob for the shell.
      - name: Stage app node_modules (avoid workspace-prune)
        run: |
          set -euo pipefail
          mkdir -p apps/perseochat/node_modules/@perseochat
          ln -sfn ../../../../packages/shell apps/perseochat/node_modules/@perseochat/shell
          test -f apps/perseochat/node_modules/@perseochat/shell/src/hub.js && echo "shell linked OK"

      - name: Build (${{ matrix.arch }})
        working-directory: apps/perseochat
        env:
          # use the natively-installed fpm, not electron-builder's x86-only one
          USE_SYSTEM_FPM: "true"
        run: |
          EV=$(node -p "require('electron/package.json').version")
          npx electron-builder --linux --${{ matrix.arch }} -c.electronVersion=$EV

      - name: Collect artifacts
        run: |
          mkdir -p out
          find dist -maxdepth 1 -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.snap" -o -name "*.flatpak" \) \
            -exec cp {} out/ \;
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: perseochat-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error

      # Publish on a tag push (releases/<tag>/…) OR a manual run (releases/v<ver>/…).
      # Either way it refreshes latest/. Skipped only for non-tag branch pushes.
      - name: Upload to Cloudflare R2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          BUCKET: perseochat-storage
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Fail loudly if credentials are missing (empty secrets = silent no-op).
          : "${AWS_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID secret is empty}"
          : "${AWS_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY secret is empty}"
          command -v aws >/dev/null || { echo "installing aws cli"; sudo apt-get install -y awscli || pip install awscli; }
          VER=$(node -p "require('./apps/perseochat/package.json').version")
          # tag push -> use the tag; manual run -> v<version>
          case "$GITHUB_REF" in refs/tags/*) TAG="$REF_NAME";; *) TAG="v$VER";; esac
          echo "==> uploading $(ls out | wc -l) files to bucket=$BUCKET tag=$TAG arch=${{ matrix.arch }}"
          ls -la out
          # Versioned artifacts: releases/<tag>/<arch>/PerseoChat-<ver>-<arch>.<ext>
          aws s3 cp out/ "s3://$BUCKET/releases/$TAG/${{ matrix.arch }}/" \
            --recursive --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32
          # Stable "latest" links (version stripped): latest/<arch>/PerseoChat-<arch>.<ext>
          mkdir -p latest
          for f in out/*; do b=$(basename "$f"); cp "$f" "latest/${b/-$VER/}"; done
          aws s3 cp latest/ "s3://$BUCKET/latest/${{ matrix.arch }}/" \
            --recursive --endpoint-url "$R2_ENDPOINT" --checksum-algorithm CRC32
          echo "==> done. verifying:"
          aws s3 ls "s3://$BUCKET/latest/${{ matrix.arch }}/" --endpoint-url "$R2_ENDPOINT"
