appId: tech.perseusoft.PerseoChat
productName: PerseoChat
copyright: © PerseuSoft
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: ../../dist
  buildResources: build
# Bundle the workspace shell (electron-builder won't traverse the symlink).
files:
  - main.js
  - node_modules/@perseochat/shell/**/*
linux:
  # clean binary/desktop/icon basename (default derived "@perseochatapp" from the
  # scoped package name and looked wrong in software centers).
  executableName: perseochat
  category: Network;InstantMessaging;Chat
  # A directory of pre-sized PNGs (16..512) — app-builder's size detection from a
  # single PNG is flaky and intermittently falls back to 0x0 (icon then lands in
  # hicolor/0x0/ which no icon theme reads, so the app shows a generic icon even
  # after install). Explicit NxN.png files make every size deterministic.
  icon: build/icons
  # electron-builder 24 merges these flat into the .desktop entry; Name and
  # StartupWMClass already default to the product name.
  desktop:
    GenericName: Messaging & AI hub
    Keywords: chat;messaging;slack;teams;discord;whatsapp;telegram;ai;
  synopsis: Unified messaging + AI hub for Linux
  description: >-
    PerseoChat bundles Slack, Teams, Discord, WhatsApp, Telegram and AI chats
    (Claude, ChatGPT, Gemini…) into one native app with isolated per-account
    sessions and persistent workspaces. By PerseuSoft.
  # --disable-gpu: Asahi's GPU stack can't allocate Chromium scanout GBM buffers
  # under Wayland yet; software compositing is smooth.
  executableArgs:
    - "--ozone-platform-hint=auto"
    - "--enable-features=WebRTCPipeWireCapturer"
    - "--disable-gpu"
  # deb / rpm / AppImage are electron-builder's battle-tested Linux targets and
  # cover Debian·Ubuntu / Fedora·RHEL·openSUSE / any-distro. snap and flatpak
  # are deferred: flatpak hits electron-builder's `--executable` bug and snap
  # needs LXD in CI — both are roadmap, tracked separately.
  target:
    - deb
    - rpm
    - AppImage
# AppStream metainfo gives software centers (GNOME Software, KDE Discover,
# GearLever) the real app name, developer and license instead of the filename /
# "Unknown author". Installed to the standard system path via raw fpm mappings.
deb:
  depends:
    - libnotify4
    - libxtst6
    - libnss3
    - libsecret-1-0
  fpm:
    - "build/tech.perseusoft.PerseoChat.metainfo.xml=/usr/share/metainfo/tech.perseusoft.PerseoChat.metainfo.xml"
rpm:
  fpm:
    - "build/tech.perseusoft.PerseoChat.metainfo.xml=/usr/share/metainfo/tech.perseusoft.PerseoChat.metainfo.xml"
