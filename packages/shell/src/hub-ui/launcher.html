<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <style>
      * { box-sizing: border-box; }
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        --bg: #0B0F19; --panel: #0E1526; --card: #131C33; --line: #24304d;
        --text: #E9EDF6; --muted: #9AA3B8; --accent: #2E8BF0; --signal: #F5822E;
        background:
          radial-gradient(80% 55% at 50% -8%, rgba(46,139,240,.16) 0%, transparent 60%),
          radial-gradient(60% 40% at 88% 8%, rgba(245,130,46,.10) 0%, transparent 55%),
          #0B0F19;
        color: var(--text); font-family: "Public Sans", system-ui, sans-serif;
        height: 100%; display: flex; flex-direction: column; user-select: none;
      }
      button { font: inherit; color: inherit; border: 0; background: transparent; cursor: pointer; }

      /* titlebar */
      #bar { height: 44px; flex: 0 0 44px; display: flex; align-items: center; padding: 0 8px; -webkit-app-region: drag; }
      #bar .sp { flex: 1; }
      #bar button { -webkit-app-region: no-drag; width: 38px; height: 32px; border-radius: 8px; color: var(--muted); display: grid; place-items: center; }
      #bar button:hover { background: #ffffff14; color: var(--text); }
      #bar button.close:hover { background: #E5484D; color: #fff; }

      /* centered stage — scroll-safe: centers when it fits, scrolls from the top otherwise */
      main { flex: 1; min-height: 0; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; padding: 2px 28px 20px; }
      main::-webkit-scrollbar { width: 12px; }
      main::-webkit-scrollbar-thumb { background: #ffffff1f; border-radius: 7px; border: 4px solid transparent; background-clip: padding-box; }
      main::-webkit-scrollbar-thumb:hover { background: #ffffff33; background-clip: padding-box; }

      .head { flex: 0 0 auto; text-align: center; padding: 2px 28px 16px; }
      .head .badge { width: 60px; height: 60px; margin: 0 auto 16px; filter: drop-shadow(0 8px 26px rgba(46,139,240,.4)); }
      .head h1 { font-family: "Space Grotesk", sans-serif; font-size: 26px; line-height: 1.2; margin: 0; letter-spacing: -0.2px; }
      .head p { margin: 8px auto 0; max-width: 460px; color: var(--muted); font-size: 14px; line-height: 1.5; }

      .grid { width: 100%; max-width: 820px; display: grid; grid-template-columns: repeat(auto-fill, 244px); justify-content: center; align-items: stretch; gap: 16px; }
      .ws {
        background: var(--card); border: 1px solid var(--line); border-radius: 16px;
        padding: 18px; display: flex; flex-direction: column; gap: 12px; min-height: 176px;
        transition: border-color .12s ease, transform .12s ease;
      }
      .ws:hover { border-color: #33507f; transform: translateY(-2px); }
      .ws-head { display: flex; align-items: center; gap: 10px; }
      .wslogo { width: 34px; height: 34px; border-radius: 9px; object-fit: cover; flex: 0 0 auto; background: #ffffff10; }
      .ws .name { font-family: "Space Grotesk", sans-serif; font-weight: 600; font-size: 18px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .ws .meta { color: var(--muted); font-size: 11px; font-family: "IBM Plex Mono", monospace; letter-spacing: .3px; margin-top: -4px; }
      .ws .icons { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; min-height: 30px; }
      .ws .icons .ic { width: 28px; height: 28px; border-radius: 8px; overflow: hidden; display: grid; place-items: center; }
      .ws .icons img { width: 80%; height: 80%; object-fit: contain; }
      .ws .icons .letter { color: #fff; font-weight: 700; font-size: 11px; }
      .ws .icons .more-n { color: var(--muted); font-size: 12px; align-self: center; }
      .ws .hint { color: var(--muted); font-size: 13px; line-height: 1.45; }
      .ws .actions { margin-top: auto; display: flex; align-items: center; gap: 6px; }
      .ws .open { flex: 1; background: var(--accent); color: #fff; height: 38px; border-radius: 10px; font-weight: 600; font-size: 14px; }
      .ws .open:hover { filter: brightness(1.08); }
      .ws .more { width: 38px; height: 38px; flex: 0 0 auto; border-radius: 10px; color: var(--muted); display: grid; place-items: center; }
      .ws .more:hover { background: #ffffff12; color: var(--text); }

      /* context menu */
      #ctx { position: fixed; z-index: 20; background: var(--panel); border: 1px solid var(--line); border-radius: 11px; padding: 6px; min-width: 176px; box-shadow: 0 14px 34px rgba(0,0,0,.55); }
      #ctx[hidden] { display: none; }
      #ctx button { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; padding: 9px 10px; border-radius: 8px; font-size: 13.5px; color: var(--text); }
      #ctx button:hover { background: var(--card); }
      #ctx button.danger { color: #ff6b6b; }
      #ctx svg { flex: 0 0 auto; }

      /* confirm dialog */
      #confirm { position: fixed; inset: 0; background: rgba(4,7,13,.62); display: none; place-items: center; z-index: 15; }
      #confirm.on { display: grid; }
      #confirm .box { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 22px; width: 380px; }
      #confirm h3 { margin: 0 0 10px; font-family: "Space Grotesk", sans-serif; font-size: 18px; }
      #confirm p { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.55; }
      #confirm .row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
      #confirm .ghost { color: var(--muted); padding: 0 14px; height: 40px; border-radius: 10px; }
      #confirm .ghost:hover { background: #ffffff10; color: var(--text); }
      #confirm .danger { background: #E5484D; color: #fff; padding: 0 18px; height: 40px; border-radius: 10px; font-weight: 600; }
      #confirm .danger:hover { filter: brightness(1.06); }

      .ws.new { border-style: dashed; align-items: center; justify-content: center; gap: 8px; color: var(--muted); cursor: pointer; }
      .ws.new:hover { color: var(--accent); border-color: var(--accent); transform: none; }
      .ws.new .plus { width: 40px; height: 40px; border-radius: 12px; background: #ffffff0d; display: grid; place-items: center; font-size: 24px; font-weight: 300; }
      .ws.new .lbl { font-size: 14px; font-weight: 500; }

      .footer { flex: 0 0 auto; display: flex; justify-content: center; padding: 14px 28px 18px; border-top: 1px solid var(--line); }
      #openAll {
        display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 20px;
        border-radius: 11px; border: 1px solid var(--line); color: var(--text);
        font-weight: 600; font-size: 14px; background: #ffffff08;
      }
      #openAll:hover { border-color: var(--accent); background: #ffffff12; }
      #openAll[hidden] { display: none; }

      /* mini prompt */
      #ask { position: fixed; inset: 0; background: rgba(4,7,13,.6); display: none; place-items: center; z-index: 10; }
      #ask.on { display: grid; }
      #ask .box { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 22px; width: 360px; }
      #ask h3 { margin: 0 0 14px; font-family: "Space Grotesk", sans-serif; font-size: 18px; }
      #ask input { width: 100%; height: 42px; border-radius: 10px; background: var(--card); border: 1px solid var(--line); color: var(--text); padding: 0 13px; font-size: 14px; outline: none; }
      #ask input:focus { border-color: var(--accent); }
      #ask .row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
      #ask .row .ghost { color: var(--muted); padding: 0 14px; height: 40px; border-radius: 10px; }
      #ask .row .ghost:hover { background: #ffffff10; color: var(--text); }
      #ask .row .ok { background: var(--accent); color: #fff; padding: 0 18px; height: 40px; border-radius: 10px; font-weight: 600; }
    </style>
  </head>
  <body>
    <div id="bar">
      <div class="sp"></div>
      <button id="min" title="Minimizar"><svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button id="close" class="close" title="Cerrar"><svg width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>

    <div class="head">
      <img class="badge" src="icons/perseo.png" alt="" />
      <h1>¿Qué espacios quieres abrir?</h1>
      <p>Cada espacio agrupa tus cuentas en su propia ventana. Ábrelos y repártelos en tus escritorios.</p>
    </div>

    <main><div class="grid" id="grid"></div></main>

    <div class="footer"><button id="openAll">Abrir todos los espacios</button></div>

    <div id="ask"><div class="box">
      <h3 id="askTitle">Nuevo espacio</h3>
      <input id="askInput" type="text" placeholder="Cliente A, Personal…" />
      <div class="row"><button class="ghost" id="askCancel">Cancelar</button><button class="ok" id="askOk">Crear</button></div>
    </div></div>

    <div id="confirm"><div class="box">
      <h3 id="confirmTitle"></h3>
      <p id="confirmMsg"></p>
      <div class="row"><button class="ghost" id="confirmCancel">Cancelar</button><button class="danger" id="confirmOk">Eliminar</button></div>
    </div></div>

    <div id="ctx" hidden></div>

    <script src="icons.js"></script>
    <script src="i18n.js"></script>
    <script src="launcher.js"></script>
  </body>
</html>
